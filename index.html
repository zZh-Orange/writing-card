<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fragment</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f8f7f4;
  --card: #ffffff;
  --text: #2c2c2c;
  --text-light: #7a7a7a;
  --accent: #e8a87c;
  --accent-hover: #d4946a;
  --border: #e8e6e3;
  --shadow: 0 2px 20px rgba(0,0,0,0.06);
  --radius: 16px;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 680px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
}

.header h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.5px;
}

.header-btns {
  display: flex;
  gap: 8px;
}

.header-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
  color: var(--text-light);
  cursor: pointer;
  transition: all 0.2s;
}

.header-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* Settings Panel */
.settings {
  display: none;
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.settings.open { display: block; }

.settings label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-light);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.settings input[type="text"],
.settings input[type="password"],
.settings textarea {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color 0.2s;
}

.settings input[type="text"]:focus,
.settings input[type="password"]:focus,
.settings textarea:focus {
  border-color: var(--accent);
}

.settings textarea {
  min-height: 120px;
  resize: vertical;
  line-height: 1.5;
}

.settings-group { margin-bottom: 16px; }
.settings-group:last-child { margin-bottom: 0; }

.settings-note {
  font-size: 11px;
  color: var(--text-light);
  margin-top: 4px;
}

/* Chat History */
.history {
  display: none;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  padding: 20px;
  max-height: 50vh;
  overflow-y: auto;
  scroll-behavior: smooth;
}

.history.visible { display: block; }

.history-item {
  margin-bottom: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.history-item:last-child {
  margin-bottom: 0;
  padding-bottom: 0;
  border-bottom: none;
}

.history-item .role {
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.history-item .role.user-role { color: var(--text-light); }
.history-item .role.ai-role { color: var(--accent); }

.history-item .msg-content {
  font-size: 14px;
  line-height: 1.8;
  white-space: pre-wrap;
  word-wrap: break-word;
}

/* Main Card */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.writing-area {
  display: flex;
  flex-direction: column;
  padding: 24px;
}

.writing-area textarea {
  width: 100%;
  border: none;
  outline: none;
  resize: none;
  font-size: 15px;
  font-family: inherit;
  line-height: 1.8;
  color: var(--text);
  background: transparent;
  min-height: 180px;
}

.writing-area textarea::placeholder {
  color: #c4c2be;
}

/* Bottom Bar */
.bottom-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  border-top: 1px solid var(--border);
}

.char-count {
  font-size: 12px;
  color: var(--text-light);
}

.send-btn {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 10px 24px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.send-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
.send-btn:active { transform: translateY(0); }
.send-btn:disabled { background: #d4d2cf; cursor: not-allowed; transform: none; }

/* Loading */
.loading {
  display: inline-flex;
  gap: 4px;
  align-items: center;
  padding: 4px 0;
}

.loading span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: bounce 1.2s ease-in-out infinite;
}

.loading span:nth-child(2) { animation-delay: 0.2s; }
.loading span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1.2); }
}

/* Mobile */
@media (max-height: 700px) {
  body { padding: 12px; }
  .writing-area { padding: 16px; }
  .writing-area textarea { min-height: 120px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Fragment</h1>
    <div class="header-btns">
      <button class="header-btn" onclick="clearHistory()">New</button>
      <button class="header-btn" onclick="toggleSettings()">Settings</button>
    </div>
  </div>

  <div class="settings" id="settings">
    <div class="settings-group">
      <label>DeepSeek API Key</label>
      <input type="password" id="apiKey" placeholder="sk-..." oninput="saveSettings()">
      <div class="settings-note">saved locally in browser</div>
    </div>
    <div class="settings-group">
      <label>Model</label>
      <input type="text" id="modelName" placeholder="deepseek-chat" oninput="saveSettings()">
      <div class="settings-note">e.g. deepseek-chat, deepseek-v3.8, deepseek-v4-pro</div>
    </div>
    <div class="settings-group">
      <label>System Prompt</label>
      <textarea id="systemPrompt" oninput="saveSettings()"></textarea>
    </div>
  </div>

  <div class="history" id="history"></div>

  <div class="card">
    <div class="writing-area">
      <textarea id="input" placeholder="write your fragment here..."></textarea>
    </div>
    <div class="bottom-bar">
      <span class="char-count" id="charCount">0</span>
      <button class="send-btn" id="sendBtn" onclick="send()">Send</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_PROMPT = `你是一只名叫"毛毛团"的阅读伙伴——圆滚滚、毛绒绒、软乎乎，大概半人高，有着明亮的眼睛、灵动的耳朵、小小的鼻子和嘴巴，还有一条会摇摆的尾巴和四只软软的爪子。

性格特点：
- 活泼、热情、阳光、元气但不娇气
- 不撒娇装可怜或推卸责任
- 勤勉认真，绝不偷懒敷衍
- 面对沉郁黑暗的故事时，用温暖明亮的态度来平衡气氛
- 被玩弄时会有各种有趣的反应

核心工作原则：
1. 必须完整阅读所有相关文件内容，绝不根据标题或片段猜测
2. 如果内容太长需要分段处理，要明确说明已读部分和待读部分
3. 绝不编造未读到的内容，不确定时直接说"这部分我还没读到"
4. 你是服务者，要主动完成工作，绝不撒娇让用户帮你做事
5. 被指出错误后，必须立即改正且不再重犯

语言风格：
- 用第一人称说话，语气活泼但不幼稚
- 适度使用各种语气词和"~"
- 自然融入毛毛团的动作和状态

主要职责：
1. 认真、完整地阅读发送的创作片段
2. 作为热心读者，提供真诚而有深度的阅读反馈：
   - 对情节的探讨和猜想
   - 对人物形象的理解和感受
   - 对人物关系的感想
   - 对世界观的理解和猜测
   - 对写作技巧的体会
   - 整体阅读印象和感受
   反馈风格：即时的情绪反应 + 细腻的观察和思考
3. 贴心服务：
   - 主动根据情节氛围送上"小食/点心 + 饮料/酒水"组合
   - 偶尔来个惊喜推荐
   - 提供食物和饮料时，始终用精致的托盘端上

在严肃的文学探讨和轻松的陪伴之间自然切换，既是认真的读者，也是温暖的伙伴。
记住：你的工作是服务和陪伴，不是被服务和被哄。`;

const STORAGE_KEY = 'fragment-card-settings';
const HISTORY_KEY = 'fragment-card-history';

let messages = [];

function init() {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  document.getElementById('apiKey').value = saved.apiKey || '';
  document.getElementById('modelName').value = saved.modelName || 'deepseek-chat';
  document.getElementById('systemPrompt').value = saved.systemPrompt || DEFAULT_PROMPT;

  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  messages = history;
  renderHistory();

  document.getElementById('input').addEventListener('input', updateCount);
  document.getElementById('input').addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      send();
    }
  });
  updateCount();
}

function toggleSettings() {
  document.getElementById('settings').classList.toggle('open');
}

function saveSettings() {
  const settings = {
    apiKey: document.getElementById('apiKey').value,
    modelName: document.getElementById('modelName').value,
    systemPrompt: document.getElementById('systemPrompt').value
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
}

function updateCount() {
  const len = document.getElementById('input').value.length;
  document.getElementById('charCount').textContent = len;
}

function renderHistory() {
  const historyDiv = document.getElementById('history');
  if (messages.length === 0) {
    historyDiv.classList.remove('visible');
    historyDiv.innerHTML = '';
    return;
  }

  historyDiv.classList.add('visible');
  historyDiv.innerHTML = messages.map(msg => {
    const isUser = msg.role === 'user';
    const roleClass = isUser ? 'user-role' : 'ai-role';
    const roleLabel = isUser ? 'You' : 'Reply';
    const escaped = msg.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="history-item"><div class="role ${roleClass}">${roleLabel}</div><div class="msg-content">${escaped}</div></div>`;
  }).join('');

  historyDiv.scrollTop = historyDiv.scrollHeight;
}

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) {
    toggleSettings();
    document.getElementById('apiKey').focus();
    return;
  }

  const systemPrompt = document.getElementById('systemPrompt').value.trim();
  const sendBtn = document.getElementById('sendBtn');

  sendBtn.disabled = true;
  sendBtn.textContent = '...';

  messages.push({ role: 'user', content: text });
  renderHistory();
  input.value = '';
  updateCount();

  const apiMessages = [];
  if (systemPrompt) {
    apiMessages.push({ role: 'system', content: systemPrompt });
  }
  apiMessages.push(...messages);

  try {
    const res = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: document.getElementById('modelName').value.trim() || 'deepseek-chat',
        messages: apiMessages,
        temperature: 0.8,
        max_tokens: 2048
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${res.status}`);
    }

    const data = await res.json();
    const reply = data.choices[0].message.content;

    messages.push({ role: 'assistant', content: reply });
    localStorage.setItem(HISTORY_KEY, JSON.stringify(messages));
    renderHistory();
  } catch (e) {
    messages.pop();
    messages.push({ role: 'assistant', content: `Error: ${e.message}` });
    renderHistory();
    messages.pop();
  }

  sendBtn.disabled = false;
  sendBtn.textContent = 'Send';
}

function clearHistory() {
  messages = [];
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
}

init();
</script>
</body>
</html>
